<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Österreich | Vision Info-Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Orbitron:wght@700&display=swap" rel="stylesheet">

    <style>
        :root {
            --oe-red: #ed2939;
            --oe-red-glow: rgba(237, 41, 57, 0.6);
            --bg-light: #f4f7f6;
            --text-main: #1a1a1a;
            --card-bg: rgba(255, 255, 255, 0.7);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #0d0d0d;
            color: #f0f0f0;
            overflow-x: hidden;
        }

        /* VERBESSERTER LOADER */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; align-items: center; justify-content: center;
            flex-direction: column; z-index: 5000; transition: opacity 0.8s;
        }

        .loader-content { text-align: center; }

        .loader-title {
            font-family: 'Orbitron';
            font-size: 1.8rem;
            letter-spacing: 8px;
            margin-bottom: 20px;
            color: #fff;
            text-shadow: 0 0 15px var(--oe-red-glow);
            animation: pulse 2s infinite;
        }

        .l-bar-wrap { 
            width: 300px; height: 4px; background: #222; 
            border-radius: 10px; overflow: hidden; position: relative;
        }

        #l-bar { 
            width: 0%; height: 100%; background: var(--oe-red); 
            box-shadow: 0 0 15px var(--oe-red);
            transition: width 0.3s cubic-bezier(0.1, 0.5, 0.5, 1); 
        }

        #l-percent {
            font-family: 'Orbitron'; font-size: 0.8rem; color: var(--oe-red);
            margin-top: 10px; letter-spacing: 2px;
        }

        @keyframes pulse {
            0% { opacity: 0.6; transform: scale(0.98); }
            50% { opacity: 1; transform: scale(1); }
            100% { opacity: 0.6; transform: scale(0.98); }
        }

        /* RESTLICHE STYLES */
        #video-intro {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: none; background: black; z-index: 4000;
        }
        .video-wrapper { width: 100%; height: 100%; }
        
        .skip-btn {
            position: absolute; bottom: 40px; right: 40px;
            background: var(--oe-red); color: white; border: none;
            padding: 15px 25px; border-radius: 8px; cursor: pointer;
            font-family: 'Orbitron'; font-size: 0.9rem; z-index: 4001;
            box-shadow: 0 0 20px var(--oe-red-glow); transition: 0.2s;
        }
        .skip-btn:hover { transform: scale(1.05); background: #ff2e3d; }

        #main-content { opacity: 0; transition: opacity 1s; background: var(--bg-light); color: var(--text-main); min-height: 100vh; }
        .glass { backdrop-filter: blur(12px); border: 1px solid rgba(0,0,0,0.05); background: var(--card-bg); }

        /* Navigation & Logo */
        nav { padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--oe-red); background: white; }
        .logo { font-weight: 800; font-family: 'Orbitron'; color: #000; }
        .logo span { color: var(--oe-red); }

        .stats-bar { display: flex; justify-content: center; gap: 30px; padding: 40px 5%; flex-wrap: wrap; }
        .stat-card { padding: 20px 40px; border-radius: 15px; text-align: center; min-width: 250px; }
        .stat-card h2 { color: var(--oe-red); font-family: 'Orbitron'; font-size: 2rem; }

        .land-path { fill: #ccc; stroke: #fff; stroke-width: 1.5; cursor: pointer; transition: .35s; }
        .land-path:hover { fill: var(--oe-red); }

        #info-panel { width: 90%; max-width: 800px; padding: 30px; margin: 30px auto; border-left: 8px solid var(--oe-red); border-radius: 15px; display: none; }
        .bezirk-tag { display: inline-block; padding: 5px 12px; background: var(--oe-red); color: white; border-radius: 15px; margin: 5px; font-size: 0.8rem; }
        
        footer { text-align: center; padding: 40px; font-size: 0.8rem; color: #666; }
    </style>
</head>
<body>

<div id="loader">
    <div class="loader-content">
        <div class="loader-title">AUSTRIA VISION</div>
        <div class="l-bar-wrap"><div id="l-bar"></div></div>
        <div id="l-percent">0%</div>
    </div>
</div>

<div id="video-intro">
    <div class="video-wrapper"><div id="player"></div></div>
    <button class="skip-btn" onclick="exitVideo()">ÜBERSPRINGEN</button>
</div>

<div id="main-content">
    <nav>
        <div class="logo">ÖSTERREICH<span>.VISION</span></div>
        <div id="clock" style="font-family:'Orbitron';">00:00:00</div>
    </nav>

    <div class="stats-bar">
        <div class="stat-card glass">
            <small>EINWOHNER 2026</small>
            <h2 id="counter1">0</h2>
        </div>
        <div class="stat-card glass">
            <small>GEMEINDEN</small>
            <h2 id="counter2">0</h2>
        </div>
    </div>

    <section style="text-align:center; padding: 20px;">
        <div class="glass" style="display:inline-block; padding: 20px; border-radius: 20px;">
            <svg viewBox="0 0 800 400" width="100%" height="auto" style="max-width:700px;">
                <path class="land-path" d="M50,200 L150,180 L160,250 L60,260 Z" onclick="updateInfo('vbg')" />
                <path class="land-path" d="M160,250 L300,230 L320,300 L170,310 Z" onclick="updateInfo('tirol')" />
                <path class="land-path" d="M300,230 L400,220 L410,330 L320,300 Z" onclick="updateInfo('sbg')" />
                <path class="land-path" d="M310,100 L470,90 L490,210 L400,210 Z" onclick="updateInfo('ooe')" />
                <path class="land-path" d="M410,330 L490,210 L630,280 L600,390 Z" onclick="updateInfo('stmk')" />
                <path class="land-path" d="M320,300 L410,330 L550,400 L330,410 Z" onclick="updateInfo('ktn')" />
                <path class="land-path" d="M470,90 L650,110 L670,270 L490,270 Z" onclick="updateInfo('noe')" />
                <circle class="land-path" cx="620" cy="160" r="15" onclick="updateInfo('wien')" />
                <path class="land-path" d="M650,110 L700,120 L680,390 L630,280 Z" onclick="updateInfo('bgld')" />
            </svg>
        </div>

        <div id="info-panel" class="glass">
            <h2 id="land-title">Bundesland</h2>
            <p>Hauptstadt: <strong id="land-cap">-</strong> | Einwohner: <strong id="land-pop">-</strong></p>
            <div id="bezirke-list" style="margin-top:15px;"></div>
        </div>
    </section>

    <footer>
        &copy; 2026 Erstellt von [Dein Name] | Schüler-Projekt | Datenstand 2026
    </footer>
</div>

<script>
    // 1. SOFORTIGER START DES LOADERS (noch vor der API)
    let progress = 0;
    const bar = document.getElementById('l-bar');
    const percentTxt = document.getElementById('l-percent');
    
    const fastLoad = setInterval(() => {
        progress += Math.random() * 5;
        if (progress >= 95) {
            progress = 95; // Stoppt kurz vor Ende, bis API bereit ist
            clearInterval(fastLoad);
        }
        updateBar();
    }, 80).

    function updateBar() {
        bar.style.width = progress + '%';
        percentTxt.innerText = Math.floor(progress) + '%';
    }

    // 2. YOUTUBE API IM HINTERGRUND
    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    var firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

    var player;
    function onYouTubeIframeAPIReady() {
        player = new YT.Player('player', {
            height: '100%', width: '100%', videoId: 'Zn1S3RtGpWs',
            playerVars: { 'autoplay': 1, 'mute': 1, 'controls': 1, 'rel': 0, 'vq': 'hd2160' },
            events: { 
                'onReady': () => {
                    progress = 100; // API bereit -> Balken voll machen
                    updateBar();
                    setTimeout(showVideo, 500);
                },
                'onStateChange': (e) => { if(e.data == YT.PlayerState.ENDED) exitVideo(); }
            }
        });
    }

    function showVideo() {
        document.getElementById('loader').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('video-intro').style.display = 'flex';
            player.playVideo();
        }, 800);
    }

    function exitVideo() {
        if (player) player.stopVideo();
        document.getElementById('video-intro').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('video-intro').style.display = 'none';
            document.getElementById('main-content').style.opacity = '1';
            animateValue("counter1", 0, 9124772, 2500);
            animateValue("counter2", 0, 2093, 2000);
        }, 800);
    }

    function animateValue(id, start, end, duration) {
        const obj = document.getElementById(id);
        let startTimestamp = null;
        const step = (timestamp) => {
            if (!startTimestamp) startTimestamp = timestamp;
            const progress = Math.min((timestamp - startTimestamp) / duration, 1);
            obj.innerHTML = Math.floor(progress * (end - start) + start).toLocaleString('de-AT');
            if (progress < 1) window.requestAnimationFrame(step);
        };
        window.requestAnimationFrame(step);
    }

    // Uhrzeit & Daten (wie zuvor)
    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);

    const data = {
        vbg:{name:"Vorarlberg", cap:"Bregenz", pop:"401.674", bez:["Bregenz", "Bludenz"]},
        tirol:{name:"Tirol", cap:"Innsbruck", pop:"764.102", bez:["Innsbruck", "Kitzbühel"]},
        sbg:{name:"Salzburg", cap:"Salzburg", pop:"562.503", bez:["Hallein", "Zell am See"]},
        ooe:{name:"Oberösterreich", cap:"Linz", pop:"1.522.825", bez:["Linz", "Wels"]},
        noe:{name:"Niederösterreich", cap:"St. Pölten", pop:"1.718.373", bez:["Baden", "Mödling"]},
        stmk:{name:"Steiermark", cap:"Graz", pop:"1.265.463", bez:["Graz", "Leoben"]},
        ktn:{name:"Kärnten", cap:"Klagenfurt", pop:"566.147", bez:["Villach", "Wolfsberg"]},
        bgld:{name:"Burgenland", cap:"Eisenstadt", pop:"297.583", bez:["Oberwart", "Rust"]},
        wien:{name:"Wien", cap:"Wien", pop:"1.982.097", bez:["Donaustadt", "Favoriten"]}
    };

    function updateInfo(key) {
        const item = data[key];
        document.getElementById('info-panel').style.display = 'block';
        document.getElementById('land-title').innerText = item.name;
        document.getElementById('land-cap').innerText = item.cap;
        document.getElementById('land-pop').innerText = item.pop;
        const list = document.getElementById('bezirke-list');
        list.innerHTML = "";
        item.bez.forEach(b => {
            const span = document.createElement('span');
            span.className = 'bezirk-tag'; span.innerText = b;
            list.appendChild(span);
        });
    }
</script>
</body>
</html>
