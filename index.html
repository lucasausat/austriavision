<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Österreich | Community Info-Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

:root{
--oe-red:#ed2939;
--bg-dark:#0a0a0a;
--text-main:#f1f1f1;
--card-bg:#1a1a1a;
--nav-bg:rgba(10,10,10,.95);
}

*{margin:0;padding:0;box-sizing:border-box}

body{
background:var(--bg-dark);
color:var(--text-main);
font-family:'Inter',sans-serif;
overflow-x:hidden;
}

/* LOADER */

#loader{
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:20000;
}

.loader-bar-container{
width:200px;
height:3px;
background:#222;
margin-top:20px;
}

.loader-bar{
height:100%;
width:0%;
background:#ed2939;
}

/* INTRO VIDEO */

#intro{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
z-index:15000;
}

#intro iframe{
width:100%;
height:100%;
border:none;
}

/* MAP */

#map{
height:500px;
border-radius:20px;
}

/* UI */

nav{
background:rgba(0,0,0,0.9);
padding:20px;
display:flex;
justify-content:space-between;
}

.section-container{
max-width:1200px;
margin:auto;
padding:40px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
margin-bottom:40px;
}

.card{
background:#1a1a1a;
padding:30px;
border-radius:20px;
}

.map-wrapper{
background:#111;
padding:40px;
border-radius:20px;
}

.stats-bar{
display:flex;
justify-content:space-around;
padding:80px;
background:black;
}

.stat-item h2{
color:#ed2939;
font-size:3rem;
}

</style>
</head>

<body>

<!-- LOADER -->

<div id="loader">

<h1>AUSTRIA</h1>

<div class="loader-bar-container">
<div class="loader-bar" id="bar"></div>
</div>

</div>

<!-- INTRO VIDEO -->

<div id="intro">

<iframe
src="https://www.youtube.com/embed/Zn1S3RtGpWs?autoplay=1&mute=1&controls=0&showinfo=0&rel=0">
</iframe>

</div>

<!-- MAIN CONTENT -->

<div id="main" style="display:none">

<nav>

<h2>Österreich Hub</h2>

</nav>

<div class="section-container">

<h1>Alpine Excellence</h1>

<div class="grid">

<div class="card">
<h3>Kultur</h3>
<p>Wiener Musik, Theater und Museen.</p>
</div>

<div class="card">
<h3>Geographie</h3>
<p>Die Alpen prägen Österreich.</p>
</div>

<div class="card">
<h3>Wirtschaft</h3>
<p>Tourismus und Technologie.</p>
</div>

</div>

<div class="map-wrapper">

<h2>Interaktive Österreich Karte</h2>

<div id="map"></div>

</div>

</div>

<section class="stats-bar">

<div class="stat-item">
<h2 id="c1">0</h2>
<p>Einwohner</p>
</div>

<div class="stat-item">
<h2 id="c2">0</h2>
<p>Bundesländer</p>
</div>

<div class="stat-item">
<h2 id="c3">0</h2>
<p>UNESCO</p>
</div>

</section>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

/* loader */

window.onload=()=>{

let w=0
let bar=document.getElementById("bar")

let int=setInterval(()=>{

w+=10
bar.style.width=w+"%"

if(w>=100){

clearInterval(int)

document.getElementById("loader").style.display="none"

startIntro()

}

},120)

}

/* cinematic intro */

function startIntro(){

let intro=document.getElementById("intro")

intro.style.display="block"

setTimeout(()=>{

intro.style.display="none"

document.getElementById("main").style.display="block"

initMap()

animateValue("c1",0,9100000,2000)
animateValue("c2",0,9,2000)
animateValue("c3",0,12,2000)

},10000)

}

/* map */

function initMap(){

const map=L.map("map").setView([47.6,14.2],7)

L.tileLayer(
"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
{
maxZoom:18
}).addTo(map)

/* Städte */

const cities=[

["Wien",48.2082,16.3738],
["Salzburg",47.8095,13.055],
["Innsbruck",47.2692,11.4041],
["Graz",47.0707,15.4395],
["Linz",48.3069,14.2858]

]

cities.forEach(c=>{

L.marker([c[1],c[2]])
.addTo(map)
.bindPopup("<b>"+c[0]+"</b>")

})

/* Bundesländer */

fetch("https://raw.githubusercontent.com/ginseng666/GeoJSON-TopoJSON-Austria/master/2018/simplified-99.9/laender_99.9.geo.json")
.then(res=>res.json())
.then(data=>{

L.geoJSON(data,{

style:{
color:"#ed2939",
weight:2,
fillOpacity:0.3
},

onEachFeature:function(feature,layer){

layer.on({

mouseover:function(e){

e.target.setStyle({
fillOpacity:0.6,
weight:3
})

},

mouseout:function(e){

e.target.setStyle({
fillOpacity:0.3,
weight:2
})

}

})

let name=feature.properties.name

layer.bindPopup(

"<h2>"+name+"</h2>"+
"<p>Bundesland Österreichs</p>"+
"<p>Beliebte Region für Tourismus.</p>"

)

}

}).addTo(map)

})

}

/* stats */

function animateValue(id,start,end,duration){

let obj=document.getElementById(id)

let startTimestamp=null

function step(timestamp){

if(!startTimestamp)startTimestamp=timestamp

let progress=Math.min((timestamp-startTimestamp)/duration,1)

obj.innerHTML=Math.floor(progress*(end-start)+start)

if(progress<1){

window.requestAnimationFrame(step)

}

}

window.requestAnimationFrame(step)

}

</script>

</body>
</html>
