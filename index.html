<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUSTRIAVISION // PROTOTYPE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=Playfair+Display:ital,wght@0,900;1,900&display=swap" rel="stylesheet">
    <style>
        :root {
            --at-red: #ed2939; 
            --deep-black: #020202;
            --glass-core: rgba(255, 255, 255, 0.015);
            --line: rgba(255, 255, 255, 0.07);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none !important; }

        body {
            background: var(--deep-black);
            font-family: 'Inter', sans-serif;
            color: #efefef;
            overflow-x: hidden;
            /* Hintergrund-Atmosphäre */
            background-image: radial-gradient(circle at 50% -20%, #2a0a0a 0%, var(--deep-black) 70%);
            background-attachment: fixed;
        }

        /* CUSTOM CURSOR SYSTEM */
        #c-main { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 99999; }
        .c-point { width: 6px; height: 6px; background: #fff; border-radius: 50%; position: absolute; transform: translate(-50%, -50%); }
        .c-trail {
            position: absolute; width: 24px; height: 14px;
            display: flex; flex-direction: column;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 0 20px rgba(237, 41, 57, 0.4);
        }
        .tr-r { background: var(--at-red); flex: 1; }
        .tr-w { background: #fff; flex: 1; }

        /* NAV HARD-STYLE */
        nav {
            position: fixed; top: 0; width: 100%; height: 80px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 5%; z-index: 1000;
            border-bottom: 1px solid var(--line);
            background: rgba(0,0,0,0.8); backdrop-filter: blur(15px);
        }
        .brand { font-size: 0.9rem; font-weight: 900; letter-spacing: 0.4em; text-transform: uppercase; }
        .brand span { color: var(--at-red); text-shadow: 0 0 10px var(--at-red); }
        
        .nav-links a {
            font-size: 0.65rem; color: #777; text-decoration: none;
            margin-left: 40px; letter-spacing: 2px; transition: 0.4s;
        }
        .nav-links a:hover { color: var(--at-red); }

        /* HERO AREA */
        header {
            height: 100vh; display: flex; align-items: center; justify-content: center;
            perspective: 2000px; position: relative;
        }
        .glitch-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(4rem, 15vw, 12rem);
            line-height: 0.85; text-align: center;
            position: relative; z-index: 5;
        }

        .hero-sub {
            position: absolute; bottom: 10%; left: 50%; transform: translateX(-50%);
            font-size: 0.6rem; letter-spacing: 1.2em; opacity: 0.4; white-space: nowrap;
        }

        /* 3D CARDS SECTION */
        .portal-wrap { padding: 150px 8%; }
        .grid-3d { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); 
            gap: 50px; 
        }

        .item-3d {
            background: var(--glass-core);
            border: 1px solid var(--line);
            border-radius: 2px;
            height: 500px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out; /* Dynamisch via JS */
        }

        .item-inner {
            position: absolute; inset: 20px;
            border: 1px solid var(--line);
            padding: 40px;
            display: flex; flex-direction: column; justify-content: flex-end;
            transform: translateZ(50px); /* Der Pop-Out Effekt */
        }

        .item-3d img {
            position: absolute; inset: 0;
            width: 100%; height: 100%;
            object-fit: cover; opacity: 0.3;
            transition: 0.6s;
        }

        .item-3d:hover img { opacity: 0.7; }
        .item-3d h3 { font-family: 'Playfair Display'; font-size: 3rem; margin-bottom: 10px; }

        /* FOOTER */
        footer { padding: 80px; text-align: center; border-top: 1px solid var(--line); font-size: 0.6rem; letter-spacing: 5px; opacity: 0.3; }

    </style>
</head>
<body>

<div id="c-main">
    <div class="c-point" id="dot"></div>
    <div class="c-trail" id="trail">
        <div class="tr-r"></div>
        <div class="tr-w"></div>
        <div class="tr-r"></div>
    </div>
</div>

<nav>
    <div class="brand">AUSTRIA<span>VISION</span></div>
    <div class="nav-links">
        <a href="#portal">DATABASE</a>
        <a href="#" id="history-trigger">CHRONIK</a>
    </div>
</nav>

<header>
    <h1 class="glitch-title">ÖSTER<br>REICH</h1>
    <div class="hero-sub">VIRTUAL HERITAGE PROTOCOL // 2026</div>
</header>

<section class="portal-wrap" id="portal">
    <div class="grid-3d">
        <div class="item-3d">
            <img src="https://images.unsplash.com/photo-1516550893923-42d28e5677af?auto=format&fit=crop&w=800">
            <div class="item-inner">
                <span style="color:var(--at-red); font-weight:900; font-size:0.7rem; letter-spacing:3px;">LOC_01</span>
                <h3>WIEN</h3>
                <p style="opacity:0.6; font-size:0.8rem;">Metropole der Moderne & Geschichte.</p>
            </div>
        </div>

        <div class="item-3d">
            <img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?auto=format&fit=crop&w=800">
            <div class="item-inner">
                <span style="color:var(--at-red); font-weight:900; font-size:0.7rem; letter-spacing:3px;">LOC_02</span>
                <h3>TIROL</h3>
                <p style="opacity:0.6; font-size:0.8rem;">Gipfelarchitektur & Alpinismus.</p>
            </div>
        </div>

        <div class="item-3d">
            <img src="https://images.unsplash.com/photo-1597605051189-9892580a6519?auto=format&fit=crop&w=800">
            <div class="item-inner">
                <span style="color:var(--at-red); font-weight:900; font-size:0.7rem; letter-spacing:3px;">LOC_03</span>
                <h3>SALZBURG</h3>
                <p style="opacity:0.6; font-size:0.8rem;">Bühne der Weltkultur.</p>
            </div>
        </div>
    </div>
</section>

<footer>
    EST. 2026 // SYSTEM TERMINAL // REPUBLIK ÖSTERREICH
</footer>

<script>
    const dot = document.getElementById('dot');
    const trail = document.getElementById('trail');
    let mx = 0, my = 0;
    let tx = 0, ty = 0;

    // Smooth Cursor Follow
    window.addEventListener('mousemove', e => {
        mx = e.clientX;
        my = e.clientY;
        dot.style.left = mx + 'px';
        dot.style.top = my + 'px';
    });

    function render() {
        tx += (mx - tx) * 0.12;
        ty += (my - ty) * 0.12;
        trail.style.left = (tx + 15) + 'px';
        trail.style.top = (ty + 15) + 'px';
        requestAnimationFrame(render);
    }
    render();

    // 3D TILT EFFECT (PRO VERSION)
    document.querySelectorAll('.item-3d').forEach(card => {
        card.addEventListener('mousemove', e => {
            const r = card.getBoundingClientRect();
            const x = e.clientX - r.left - r.width/2;
            const y = e.clientY - r.top - r.height/2;
            card.style.transform = `rotateY(${x/15}deg) rotateX(${-y/15}deg)`;
        });
        card.addEventListener('mouseleave', () => {
            card.style.transform = `rotateY(0deg) rotateX(0deg)`;
        });
    });

    // Hover Scaling for interactive elements
    document.querySelectorAll('.item-3d, a').forEach(el => {
        el.addEventListener('mouseenter', () => dot.style.transform = 'translate(-50%, -50%) scale(10)');
        el.addEventListener('mouseleave', () => dot.style.transform = 'translate(-50%, -50%) scale(1)');
    });
</script>

</body>
</html>
