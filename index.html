<div id="region-data">
    <h2>Interaktive Karte</h2>
    <div class="map-container" style="max-width: 800px; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.1));">
        <svg viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg" style="width: 100%; height: auto;">
            <style>
                .land { 
                    transition: all 0.3s ease; 
                    stroke: #fff; 
                    stroke-width: 1.5; 
                    fill: #d1d1d1; /* Standard-Farbe */
                }
                body.dark-mode .land { fill: #333; stroke: #1a1a1a; }
                .land:hover { 
                    fill: var(--oe-red) !important; 
                    filter: brightness(1.1);
                    transform: translateY(-2px);
                }
                .land-label {
                    font-family: 'Inter', sans-serif;
                    font-size: 14px;
                    font-weight: 800;
                    fill: rgba(0,0,0,0.3);
                    pointer-events: none;
                    text-transform: uppercase;
                }
                body.dark-mode .land-label { fill: rgba(255,255,255,0.2); }
            </style>
            
            <path class="land" d="M30,150 L80,140 L90,180 L40,200 Z" onclick="mapClick('Vorarlberg')" />
            <path class="land" d="M90,180 L250,160 L260,210 L150,230 L85,210 Z" onclick="mapClick('Tirol')" />
            <path class="land" d="M250,160 L350,150 L360,250 L280,260 L260,210 Z" onclick="mapClick('Salzburg')" />
            <path class="land" d="M260,50 L420,40 L440,150 L350,150 L250,160 Z" onclick="mapClick('Oberösterreich')" />
            <path class="land" d="M420,40 L600,60 L620,200 L440,210 L440,150 Z" onclick="mapClick('Niederösterreich')" />
            <circle class="land" cx="570" cy="110" r="25" onclick="mapClick('Wien')" style="fill: #999;" />
            <path class="land" d="M360,250 L440,210 L580,240 L550,320 L380,330 Z" onclick="mapClick('Steiermark')" />
            <path class="land" d="M280,260 L360,250 L500,310 L480,360 L300,350 Z" onclick="mapClick('Kärnten')" />
            <path class="land" d="M600,60 L650,70 L630,300 L580,240 L620,200 Z" onclick="mapClick('Burgenland')" />

            <text x="50" y="175" class="land-label">V</text>
            <text x="150" y="200" class="land-label">T</text>
            <text x="300" y="210" class="land-label">S</text>
            <text x="320" y="100" class="land-label">OÖ</text>
            <text x="500" y="100" class="land-label">NÖ</text>
            <text x="560" y="115" class="land-label" style="fill:#fff; font-size:10px;">W</text>
            <text x="450" y="270" class="land-label">ST</text>
            <text x="370" y="320" class="land-label">K</text>
            <text x="610" y="180" class="land-label" transform="rotate(10, 610, 180)">B</text>
        </svg>
    </div>
    <div id="land-info" style="font-size: 1.5rem; letter-spacing: 1px; text-transform: uppercase;">Wähle eine Region auf der Karte</div>
    
    <div class="grid">
        <div class="card"><h3>Föderalismus</h3><p>Jedes der 9 Bundesländer hat einen eigenen Landtag und eine eigene Landesregierung.</p></div>
        <div class="card"><h3>Topographie</h3><p>60% des Staatsgebiets sind gebirgig (Alpenanteil).</p></div>
    </div>
</div>
