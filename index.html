<div class="maintenance-box">
    <div class="label-group">
        <span>System-Rekonstruktion</span>
        <span class="percent-counter">20%</span>
    </div>
    
    <div class="bar-bg">
        <div class="bar-fill">
            <div class="bar-scan"></div>
        </div>
    </div>
    
    <div class="status-info">
        <div class="dot"></div>
        <span class="typing-text">Initialisierung der neuen Datenbank-Struktur...</span>
    </div>
</div>

<style>
    /* 1. Ladebalken: Stoppt exakt bei 20% */
    .bar-fill {
        height: 100%;
        background: var(--oe-red);
        box-shadow: 0 0 20px rgba(237, 41, 57, 0.5);
        width: 0%;
        position: relative;
        overflow: hidden;
        animation: load 2.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    @keyframes load {
        from { width: 0%; }
        to { width: 20%; }
    }

    /* 2. Der Lichtstreifen (Scan), der über den 20%-Balken läuft */
    .bar-scan {
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(
            90deg, 
            transparent, 
            rgba(255, 255, 255, 0.3), 
            transparent
        );
        animation: scan 2s infinite linear;
        animation-delay: 2.5s; /* Startet wenn der Balken die 20% erreicht hat */
    }

    @keyframes scan {
        from { left: -100%; }
        to { left: 100%; }
    }

    /* 3. Text-Animationen (Pulsieren & Blinken) */
    .typing-text {
        opacity: 0.8;
        animation: blinkText 1.5s infinite ease-in-out;
    }

    @keyframes blinkText {
        0%, 100% { opacity: 0.6; transform: translateX(0); }
        50% { opacity: 1; transform: translateX(2px); }
    }

    .dot {
        width: 8px;
        height: 8px;
        background: var(--oe-red);
        border-radius: 50%;
        box-shadow: 0 0 10px var(--oe-red);
        animation: pulseDot 1s infinite alternate;
    }

    @keyframes pulseDot {
        from { transform: scale(1); opacity: 1; }
        to { transform: scale(1.3); opacity: 0.4; }
    }

    /* 4. Prozent-Counter Effekt */
    .percent-counter {
        font-weight: 800;
        color: var(--oe-red);
        animation: countUp 2.5s forwards;
    }

    @keyframes countUp {
        0% { opacity: 0.3; }
        50% { opacity: 1; }
        70% { opacity: 0.7; }
        100% { opacity: 1; }
    }
</style>
