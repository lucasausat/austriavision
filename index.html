<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wartungsarbeiten | Österreich.hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --oe-red: #ed2939;
            --bg-dark: #0a0a0a;
            --card-bg: #141414;
            --text-main: #f1f1f1;
            --text-muted: #666;
        }

        body {
            background: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Hintergrund-Effekt */
        .glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--oe-red);
            filter: blur(150px);
            opacity: 0.15;
            z-index: 1;
            animation: move 10s infinite alternate;
        }

        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            max-width: 600px;
            padding: 40px;
            background: rgba(20, 20, 20, 0.8);
            border: 1px solid #222;
            border-radius: 40px;
            backdrop-filter: blur(20px);
        }

        .logo {
            font-size: 1.2rem;
            font-weight: 800;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }
        .logo span { color: var(--oe-red); }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 10px;
            background: linear-gradient(to bottom, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 40px;
        }

        /* Progress Bereich */
        .maintenance-box {
            background: #000;
            padding: 25px;
            border-radius: 20px;
            text-align: left;
            border: 1px solid #1a1a1a;
        }

        .label-group {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .bar-bg {
            height: 4px;
            background: #1a1a1a;
            border-radius: 2px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            background: var(--oe-red);
            box-shadow: 0 0 15px var(--oe-red);
            width: 0%;
            animation: load 3s forwards ease-out;
        }

        .status-info {
            font-size: 0.75rem;
            color: #444;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .dot {
            width: 6px;
            height: 6px;
            background: var(--oe-red);
            border-radius: 50%;
            animation: blink 1s infinite;
        }

        @keyframes load {
            to { width: 65%; }
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        @keyframes move {
            from { transform: translate(-50%, -50%); }
            to { transform: translate(50%, 50%); }
        }

        .date-badge {
            display: inline-block;
            margin-top: 30px;
            padding: 8px 16px;
            border: 1px solid #333;
            border-radius: 50px;
            font-size: 0.8rem;
            color: var(--oe-red);
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="glow"></div>

    <div class="container">
        <div class="logo">ÖSTERREICH<span>.hub</span></div>
        
        <h1>Offline.</h1>
        <p>
            Wir führen aktuell eine umfassende Neustrukturierung des Info-Portals durch. 
            Neue Schnittstellen und verbesserte Kartenfunktionen sind in Arbeit.
        </p>

        <div class="maintenance-box">
            <div class="label-group">
                <span>System-Rekonstruktion</span>
                <span>65%</span>
            </div>
            <div class="bar-bg">
                <div class="bar-fill"></div>
            </div>
            
            <div class="status-info">
                <div class="dot"></div>
                Datenbank-Migration & API-Anbindung läuft...
            </div>
        </div>

        <div class="date-badge">
            Voraussichtliche Rückkehr: Ende März 2026
        </div>
    </div>

</body>
</html>
